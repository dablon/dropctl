name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --lib
      - run: cargo build

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: strip target/release/dropctl
      - run: sha256sum target/release/dropctl > dropctl-linux-x86_64.txt
      - run: mv target/release/dropctl dropctl-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: dropctl-linux
          path: |
            dropctl-linux-x86_64
            dropctl-linux-x86_64.txt

  build-macos-x86:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: sha256sum target/release/dropctl > dropctl-macos-x86_64.txt
      - run: mv target/release/dropctl dropctl-macos-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: dropctl-macos-x86_64
          path: |
            dropctl-macos-x86_64
            dropctl-macos-x86_64.txt

  build-macos-arm:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --target aarch64-apple-darwin
      - run: sha256sum target/aarch64-apple-darwin/release/dropctl > dropctl-macos-arm64.txt
      - run: mv target/aarch64-apple-darwin/release/dropctl dropctl-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dropctl-macos-arm64
          path: |
            dropctl-macos-arm64
            dropctl-macos-arm64.txt

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --target x86_64-pc-windows-gnu
      - run: sha256sum target/x86_64-pc-windows-gnu/release/dropctl.exe > dropctl-windows-x86_64.txt
      - run: mv target/x86_64-pc-windows-gnu/release/dropctl.exe dropctl-windows-x86_64.exe
      - uses: actions/upload-artifact@v4
        with:
          name: dropctl-windows-x86_64
          path: |
            dropctl-windows-x86_64.exe
            dropctl-windows-x86_64.txt

  release:
    needs: [build-linux, build-macos-x86, build-macos-arm, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: dropctl ${{ steps.version.outputs.version }}
          body: |
            ## dropctl ${{ steps.version.outputs.version }}
            
            Multi-platform binary releases
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | dropctl-linux-x86_64 |
            | macOS x86_64 | dropctl-macos-x86_64 |
            | macOS ARM64 | dropctl-macos-arm64 |
            | Windows x86_64 | dropctl-windows-x86_64.exe |
            
            ### Checksums
            ```
            $(cat artifacts/dropctl-linux/dropctl-linux-x86_64.txt)
            $(cat artifacts/dropctl-macos-x86_64/dropctl-macos-x86_64.txt)
            $(cat artifacts/dropctl-macos-arm64/dropctl-macos-arm64.txt)
            $(cat artifacts/dropctl-windows-x86_64/dropctl-windows-x86_64.txt)
            ```
          files: |
            artifacts/dropctl-linux/dropctl-linux-x86_64
            artifacts/dropctl-macos-x86_64/dropctl-macos-x86_64
            artifacts/dropctl-macos-arm64/dropctl-macos-arm64
            artifacts/dropctl-windows-x86_64/dropctl-windows-x86_64.exe
