name: Auto Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: |
          cargo build --release --locked
          strip target/release/dropctl

      - name: Create checksums
        run: sha256sum target/release/dropctl > checksums.txt

      - name: Download artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: dropctl ${{ steps.version.outputs.version }}
          body: |
            ## dropctl ${{ steps.version.outputs.version }}
            
            Automatic release from commit `${{ github.sha }}`
            
            ### Usage
            ```bash
            # Listen for files
            ./dropctl listen 7777
            
            # Send file
            ./dropctl send 192.168.1.100:7777 file.zip
            ```
          files: |
            target/release/dropctl
            checksums.txt
