name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --lib
      - run: cargo build

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(date +'%Y.%m.%d.%H%M')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Build Linux
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - run: cargo build --release --locked --target x86_64-unknown-linux-gnu
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_STRIP: strip
      - name: Checksum Linux
        run: sha256sum target/x86_64-unknown-linux-gnu/release/dropctl > dropctl-linux-x86_64.txt

      - name: Build macOS x86_64
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --locked --target x86_64-apple-darwin
      - name: Checksum macOS x86_64
        run: sha256sum target/x86_64-apple-darwin/release/dropctl > dropctl-macos-x86_64.txt

      - name: Build macOS ARM64
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --release --locked --target aarch64-apple-darwin
      - name: Checksum macOS ARM64
        run: sha256sum target/aarch64-apple-darwin/release/dropctl > dropctl-macos-arm64.txt

      - name: Build Windows
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu
      - run: cargo build --release --locked --target x86_64-pc-windows-gnu
      - name: Checksum Windows
        run: sha256sum target/x86_64-pc-windows-gnu/release/dropctl.exe > dropctl-windows-x86_64.txt

      - name: Rename files
        run: |
          mv target/x86_64-unknown-linux-gnu/release/dropctl dropctl-linux-x86_64
          mv target/x86_64-apple-darwin/release/dropctl dropctl-macos-x86_64
          mv target/aarch64-apple-darwin/release/dropctl dropctl-macos-arm64
          mv target/x86_64-pc-windows-gnu/release/dropctl.exe dropctl-windows-x86_64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: dropctl ${{ steps.version.outputs.version }}
          body: |
            ## dropctl ${{ steps.version.outputs.version }}
            
            Multi-platform binary releases
            
            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | dropctl-linux-x86_64 |
            | macOS x86_64 | dropctl-macos-x86_64 |
            | macOS ARM64 | dropctl-macos-arm64 |
            | Windows x86_64 | dropctl-windows-x86_64.exe |
            
            ### Checksums
            ```
            $(cat dropctl-linux-x86_64.txt)
            $(cat dropctl-macos-x86_64.txt)
            $(cat dropctl-macos-arm64.txt)
            $(cat dropctl-windows-x86_64.txt)
            ```
          files: |
            dropctl-linux-x86_64
            dropctl-macos-x86_64
            dropctl-macos-arm64
            dropctl-windows-x86_64.exe
            dropctl-linux-x86_64.txt
            dropctl-macos-x86_64.txt
            dropctl-macos-arm64.txt
            dropctl-windows-x86_64.txt
